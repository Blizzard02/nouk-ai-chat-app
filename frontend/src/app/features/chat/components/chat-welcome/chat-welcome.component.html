<div class="chat-welcome">
  <app-empty-state
    icon="auto_awesome"
    title="Start a new conversation"
    message="Pick a provider, tune the settings, and start chatting. Every conversation keeps its own model, temperature, and system prompt."
  >
    <button type="button" mat-flat-button color="primary" (click)="startChat()">
      <mat-icon>add</mat-icon>
      New chat
    </button>
  </app-empty-state>
</div>
